<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Updated dynamically by app.js to match catalog siteTitle -->
  <title>Mr. Neft • CCSS Hub</title>

  <meta
    name="description"
    content="Search, filter, and launch math games and resources for CCSS-aligned instruction."
  />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- Page identity -->
  <header class="hub-header">
    <div class="hub-header-inner">
      <h1 class="hub-title" id="siteTitle">Mr. Neft • CCSS Hub</h1>
      <p class="hub-sub" id="hubDescription">
        Search, filter, and launch games and resources.
      </p>
    </div>
  </header>

  <!-- Filter / search controls, outside header as its own landmark -->
  <search aria-label="Filter games and resources">
    <form
      class="hub-controls"
      id="filtersForm"
      aria-labelledby="filtersLegend"
      novalidate
    >
      <!-- Screen-reader label for the form as a whole -->
      <span id="filtersLegend" class="visually-hidden">
        Filter games and resources by keyword, type, unit, and CCSS code
      </span>

      <label class="visually-hidden" for="q">
        Search games and resources
      </label>
      <input
        id="q"
        class="hub-input"
        type="search"
        name="query"
        autocomplete="off"
        spellcheck="false"
        placeholder="Search (e.g., inequalities, 6.EE, number line)…"
        aria-describedby="hubDescription"
      />

      <label class="visually-hidden" for="type">Filter by type</label>
      <select id="type" class="hub-input" name="type" aria-label="Filter by type">
        <option value="">All Types</option>
        <option value="game">Games</option>
        <option value="resource">Resources</option>
      </select>

      <label class="visually-hidden" for="unit">Filter by unit</label>
      <select id="unit" class="hub-input" name="unit" aria-label="Filter by unit">
        <option value="">All Units</option>
      </select>

      <label class="visually-hidden" for="ccss">Filter by CCSS standard</label>
      <select id="ccss" class="hub-input" name="ccss" aria-label="Filter by CCSS standard">
        <option value="">All CCSS</option>
      </select>

      <button
        id="resetBtn"
        class="hub-btn"
        type="button"
        aria-label="Reset all filters"
      >
        Reset
      </button>
    </form>
  </search>

  <!-- Dynamic card grid rendered by app.js -->
  <main
    id="app"
    class="hub-main"
    aria-live="polite"
    aria-relevant="additions removals"
    aria-atomic="false"
    aria-label="Games and resources"
  >
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
